<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANM LineeVivo</title>
  <meta name="theme-color" content="#f4821f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LineeVivo" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (per notifiche push) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
</head>
<body style="margin:0;padding:0;background:#070b14">
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Service worker principale (cache offline)
        navigator.serviceWorker.register('sw.js')
          .then(r => console.log('SW registrato:', r.scope))
          .catch(e => console.warn('SW errore:', e));
        // Firebase Messaging SW (notifiche push)
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then(r => console.log('FCM SW registrato:', r.scope))
          .catch(e => console.warn('FCM SW errore:', e));
      });
    }
  </script>
</body>
</html>
